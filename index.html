<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WAR Scouting 2026</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }

        body {
            background-color: black;
            color: rgb(185, 0, 0);
            font-family: Arial, sans-serif;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            height: 100dvh;
        }

        h1 {
            color: rgb(185, 0, 0);
            font-size: 8vw;
            margin-bottom: 40px;
        }

        p {
            color: white;
            font-size: calc(2vw + 15px);
            margin: 20px 10vw;
            text-align: center;
            max-width: 600px;
        }

        button {
            background-color: rgb(185, 0, 0);
            color: black;
            border: none;

            padding: 25px 50px;
            font-size: 7vw;

            cursor: pointer;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        button:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <h1>WAR Scouting 2026</h1>

    <button onclick="handleClick()">CLICK HERE!</button>

    <p>After you click the button, scroll down to "Edit Config", paste the URL (already copied for you), and click save.</p>

    <script>
        function handleClick() {
            const textToCopy = "https://raw.githubusercontent.com/warroboticss/scouting/refs/heads/main/config.json";

            navigator.clipboard.writeText(textToCopy)
                .then(() => {
                    window.location.href = "https://frc2713.github.io/QRScout/";
                })
                .catch(err => {
                    console.error("Copy failed:", err);
                });
        }
    </script>

</body>
</html>
